# SPDX-License-Identifier: Apache-2.0
name: unit-tests

on:
  workflow_call:
    inputs:
      assemble_output_run_id:
        type: string
        required: true

env:
  GRADLE_OPTS: "-Xmx6g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

permissions:
  actions: read
  contents: read

jobs:
  unitTests:
    runs-on: besu-research-ubuntu-16
    timeout-minutes: 30
    permissions:
      checks: write
      statuses: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Download assemble-output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: assemble-output
          run-id: ${{ inputs.assemble_output_run_id }}
          github-token: ${{ github.token }}
          path: ${{ github.workspace }}

      - name: Setup Java and Gradle
        uses: consensys/github-actions/java-setup-gradle@2a7c66c86174927c67f7eb444bc4fd605ce680c1

      - name: Run unit tests
        env:
          # limit forks to reduce JVM setup overhead (SignatureAlgorithm etc)
          GRADLE_MAX_TEST_FORKS: 2
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: unit-test-results
          path: '**/test-results/**/TEST-*.xml'
          retention-days: 1

      - name: Upload HTML reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: success() || failure()
        with:
          name: unit-test-html-reports
          path: '**/build/reports/tests/test/**'
          retention-days: 1

  unitTestsPassed:
    name: unitTestsPassed
    runs-on: ubuntu-latest
    needs: [unitTests]
    permissions:
      checks: write
      statuses: write
    if: always()
    steps:
      - name: Fail on workflow error
        run: exit 1
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
            || contains(needs.*.result, 'skipped')
          }}
